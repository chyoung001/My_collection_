<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>??? — My Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-base);
      overflow-x: hidden;
    }

    /* 입장 잠금 오버레이 */
    #gate {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #gate.hide {
      animation: gateOut 0.6s ease forwards;
    }
    @keyframes gateOut {
      to { opacity: 0; transform: scale(1.04); pointer-events: none; }
    }

    /* 파티클 배경 */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold-base);
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-20px) scale(1); opacity: 0; }
    }

    /* 메인 컨테이너 */
    .vault-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 32px 80px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: contentIn 0.5s ease 0.4s forwards;
    }
    @keyframes contentIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 헤더 */
    .vault-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .vault-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }
    .vault-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--gold-base), var(--gold-hover), #fff8dc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .vault-sub {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .unlock-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 5px 16px;
      background: var(--gold-muted);
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 999px;
      font-size: 0.78rem;
      color: var(--gold-base);
      font-weight: 600;
    }

    /* 컬렉터 등급 */
    .tier-card {
      background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(212,175,55,0.03));
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .tier-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 70%);
    }
    .tier-emoji { font-size: 3.5rem; display: block; margin-bottom: 10px; }
    .tier-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--gold-base);
      margin-bottom: 4px;
    }
    .tier-desc { font-size: 0.82rem; color: var(--text-secondary); }

    /* 통계 그리드 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-block {
      background: var(--surface-1);
      border: 1px solid var(--border-base);
      border-radius: 16px;
      padding: 20px 22px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-block:hover {
      border-color: rgba(212,175,55,0.3);
      transform: translateY(-2px);
    }
    .stat-block-icon {
      font-size: 1.3rem;
      color: var(--gold-base);
      margin-bottom: 10px;
      display: block;
    }
    .stat-block-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .stat-block-value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
    }
    .stat-block-sub { font-size: 0.75rem; color: var(--text-secondary); margin-top: 3px; }

    /* 등급별 분포 */
    .grade-dist {
      background: var(--surface-1);
      border: 1px solid var(--border-base);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 24px;
    }
    .grade-dist h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .dist-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .dist-label { font-size: 0.82rem; font-weight: 600; min-width: 60px; }
    .dist-bar-wrap { flex: 1; background: rgba(255,255,255,0.05); border-radius: 999px; height: 8px; overflow: hidden; }
    .dist-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--gold-base), var(--gold-hover)); transition: width 0.8s ease; }
    .dist-count { font-size: 0.78rem; color: var(--text-secondary); min-width: 28px; text-align: right; }

    /* TOP 카드 */
    .top-cards {
      background: var(--surface-1);
      border: 1px solid var(--border-base);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 24px;
    }
    .top-cards h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .top-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .top-card-row:last-child { border-bottom: none; }
    .top-card-rank { font-size: 1.3rem; margin-right: 12px; }
    .top-card-info { flex: 1; }
    .top-card-name { font-weight: 600; font-size: 0.88rem; }
    .top-card-meta { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }
    .top-card-price { font-family: 'Poppins', sans-serif; font-weight: 700; color: var(--gold-base); }

    /* 스냅샷 이력 */
    .snapshot-section {
      background: var(--surface-1);
      border: 1px solid var(--border-base);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 32px;
    }
    .snapshot-section h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .snap-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.82rem;
    }
    .snap-row:last-child { border-bottom: none; }
    .snap-name { font-weight: 500; }
    .snap-meta { color: var(--text-secondary); font-size: 0.74rem; margin-top: 2px; }
    .snap-price { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 0.88rem; }

    /* 뒤로가기 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface-1);
      border: 1px solid var(--border-base);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 32px;
    }
    .back-btn:hover { color: var(--text-primary); border-color: rgba(212,175,55,0.3); }

    /* 로딩 */
    .loading-spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(212,175,55,0.2);
      border-top-color: var(--gold-base);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 문서 카드 섹션 */
    .docs-section {
      margin-bottom: 40px;
    }
    .docs-section-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
    .docs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .doc-card {
      background: var(--surface-1);
      border: 1px solid var(--border-base);
      border-radius: 18px;
      padding: 24px 22px 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .doc-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-base), var(--gold-hover));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .doc-card:hover {
      border-color: rgba(212,175,55,0.35);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .doc-card:hover::before { transform: scaleX(1); }
    .doc-card-icon {
      font-size: 1.8rem;
      display: block;
      margin-bottom: 12px;
    }
    .doc-card-tag {
      display: inline-block;
      padding: 2px 10px;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 999px;
      font-size: 0.68rem;
      color: var(--gold-base);
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .doc-card-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .doc-card-preview {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .doc-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .doc-card-date {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .doc-card-read {
      font-size: 0.72rem;
      color: var(--gold-base);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 문서 모달 */
    #doc-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #doc-modal.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
    }
    .modal-panel {
      position: relative;
      z-index: 1;
      background: var(--surface-1);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 22px;
      width: 100%;
      max-width: 660px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 36px 40px 40px;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s ease;
    }
    #doc-modal.open .modal-panel {
      transform: translateY(0) scale(1);
    }
    .modal-panel::-webkit-scrollbar { width: 4px; }
    .modal-panel::-webkit-scrollbar-track { background: transparent; }
    .modal-panel::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.25); border-radius: 999px; }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }
    .modal-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    .modal-tag {
      display: inline-block;
      padding: 2px 10px;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 999px;
      font-size: 0.68rem;
      color: var(--gold-base);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      line-height: 1.3;
    }
    .modal-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-base);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .modal-divider {
      height: 1px;
      background: var(--border-base);
      margin-bottom: 24px;
    }
    .modal-body {
      font-size: 0.88rem;
      line-height: 1.85;
      color: var(--text-secondary);
    }
    .modal-body p { margin-bottom: 10px; }
    .modal-body strong { color: var(--text-primary); }
    .modal-section-heading {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--text-primary);
      margin: 20px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(212,175,55,0.2);
    }
    .modal-list {
      list-style: none;
      margin: 0 0 14px 0;
      padding: 0;
    }
    .modal-list li {
      position: relative;
      padding-left: 18px;
      margin-bottom: 6px;
    }
    .modal-list li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--gold-base);
      font-weight: 700;
    }
    .modal-date {
      margin-top: 28px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
    }

    /* 모달 테이블 */
    .modal-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin: 12px 0 20px;
      display: block;
      overflow-x: auto;
    }
    .modal-table th {
      background: rgba(212,175,55,0.1);
      color: var(--gold-base);
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      white-space: nowrap;
    }
    .modal-table td {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .modal-table tr:last-child td { border-bottom: none; }
    .modal-table tr:hover td { background: rgba(255,255,255,0.025); }

    @media (max-width: 700px) {
      .docs-grid { grid-template-columns: 1fr; }
      .modal-panel { padding: 28px 24px 32px; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .vault-container { padding: 32px 16px 60px; }
    }
  </style>
</head>
<body>

  <!-- 입장 검증 오버레이 -->
  <div id="gate">
    <div class="loading-spin"></div>
    <p style="color:var(--text-secondary); font-size:0.82rem;">잠금 해제 중...</p>
  </div>

  <!-- 파티클 -->
  <div class="particles" id="particles"></div>

  <div class="vault-container">

    <!-- 헤더 -->
    <div class="vault-header">
      <span class="vault-icon">🔐</span>
      <h1 class="vault-title">Secret WIKI</h1>
      <div class="unlock-badge">
        <i class="ri-lock-unlock-line"></i> 잠금 해제 완료
      </div>
    </div>

    <!-- 뒤로가기 -->
    <a class="back-btn" href="./collection.html">
      <i class="ri-arrow-left-line"></i> My Collection으로 돌아가기
    </a>

    <!-- 문서 카드 섹션 -->
    <div class="docs-section">
      <p class="docs-section-title">제작자의 TMI 노트</p>
      <div class="docs-grid" id="docs-grid"></div>
    </div>

  </div>

  <!-- 문서 모달 -->
  <div id="doc-modal">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-panel" id="modal-panel">
      <div class="modal-header">
        <div>
          <span class="modal-icon" id="modal-icon"></span>
          <span class="modal-tag" id="modal-tag"></span>
          <h2 class="modal-title" id="modal-title"></h2>
        </div>
        <button class="modal-close" id="modal-close" aria-label="닫기">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-body" id="modal-body"></div>
      <p class="modal-date" id="modal-date"></p>
    </div>
  </div>

<script>
  // ── 본문 마크다운 렌더러 ─────────────────────────────────
  function renderBody(text) {
    const bold = s => s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    const lines = text.split("\n").map(l => l.trim());
    let html = "";
    let inList = false;
    let tableRows = [];

    const flushTable = () => {
      if (!tableRows.length) return;
      const isSep = r => /^[\|\s\-:]+$/.test(r);
      const parse = r => r.split("|").slice(1, -1).map(c => c.trim());
      let t = '<table class="modal-table"><thead><tr>';
      parse(tableRows[0]).forEach(h => { t += `<th>${bold(h)}</th>`; });
      t += "</tr></thead><tbody>";
      tableRows.slice(2).forEach(r => {
        if (isSep(r)) return;
        t += "<tr>";
        parse(r).forEach(c => { t += `<td>${bold(c)}</td>`; });
        t += "</tr>";
      });
      t += "</tbody></table>";
      html += t;
      tableRows = [];
    };

    for (const line of lines) {
      // 테이블 행 감지
      if (line.startsWith("|")) {
        if (inList) { html += "</ul>"; inList = false; }
        tableRows.push(line);
        continue;
      }
      if (tableRows.length) flushTable();
      // 빈 줄
      if (!line) {
        if (inList) { html += "</ul>"; inList = false; }
        continue;
      }
      // 번호 섹션: "1. 제목" 또는 "1. **제목**"
      const numMatch = line.match(/^(\d+)\.\s+(.+)$/);
      if (numMatch) {
        if (inList) { html += "</ul>"; inList = false; }
        html += `<p class="modal-section-heading">${numMatch[1]}. ${bold(numMatch[2])}</p>`;
        continue;
      }
      // 불릿: "- 항목"
      if (line.startsWith("- ")) {
        if (!inList) { html += '<ul class="modal-list">'; inList = true; }
        html += `<li>${bold(line.slice(2))}</li>`;
        continue;
      }
      // 일반 문단
      if (inList) { html += "</ul>"; inList = false; }
      html += `<p>${bold(line)}</p>`;
    }
    if (inList) html += "</ul>";
    if (tableRows.length) flushTable();
    return html;
  }

  // ── 진입 토큰 검증 ───────────────────────────────────────
  const token = sessionStorage.getItem("__vault_token");
  if (!token) {
    // 직접 URL 접근 → 즉시 차단
    document.getElementById("gate").innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:3rem;margin-bottom:16px;">🚫</div>
        <p style="color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:8px;">접근 불가</p>
        <p style="color:var(--text-secondary);font-size:0.82rem;margin-bottom:24px;">이 페이지는 직접 접근할 수 없습니다</p>
        <a href="./collection.html" style="
          display:inline-block;padding:10px 24px;background:var(--gold-base);
          color:#000;border-radius:10px;font-weight:700;font-size:0.88rem;text-decoration:none;
        ">돌아가기</a>
      </div>`;
  } else {
    // 토큰 소비 (한 번만 사용)
    sessionStorage.removeItem("__vault_token");
    // 게이트 해제
    const gate = document.getElementById("gate");
    gate.classList.add("hide");
    setTimeout(() => gate.remove(), 700);
  }
  // ── 파티클 생성 ───────────────────────────────────────────
  const particleWrap = document.getElementById("particles");
  for (let i = 0; i < 28; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";

  // ── 모달 열기/닫기 ────────────────────────────────────────
  const modal = document.getElementById("doc-modal");

  function openModal(i) {
    const doc = DOCS[i];
    document.getElementById("modal-icon").textContent  = doc.icon;
    document.getElementById("modal-tag").textContent   = doc.tag;
    document.getElementById("modal-title").textContent = doc.title;
    document.getElementById("modal-date").textContent  = doc.date;
    document.getElementById("modal-body").innerHTML = renderBody(doc.body);
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    modal.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-backdrop").addEventListener("click", closeModal);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
